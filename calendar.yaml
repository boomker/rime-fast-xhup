# custom_calendar.yaml
# 自定义日历数据文件，放置于 Rime 用户目录下。
# 在 predict_trigger_rules 中通过以下方式引用：
#
#   predict_trigger_rules:
#     - calendar_data: custom_calendar.yaml
#
# solar_terms: 节气数据，key 为 "MM-DD"，value 为节气名
# holidays:    节假日数据，key 为 "YYYY-MM-DD"，value 为标签列表

solar_terms:
  "02-04": 立春
  "02-19": 雨水
  "03-06": 惊蛰
  "03-20": 春分
  "04-04": 清明
  "04-05": 清明
  "04-20": 谷雨
  "05-06": 立夏
  "05-21": 小满
  "06-06": 芒种
  "06-21": 夏至
  "07-07": 小暑
  "07-23": 大暑
  "08-07": 立秋
  "08-23": 处暑
  "09-08": 白露
  "09-23": 秋分
  "10-08": 寒露
  "10-23": 霜降
  "11-07": 立冬
  "11-22": 小雪
  "12-07": 大雪
  "12-22": 冬至

holidays:
  # 以下为2026年，每年更新此文件即可
  "2026-01-01": [元旦]
  "2026-01-28": [春节, 除夕]

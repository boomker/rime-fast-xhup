  "2026-02-17": [春节]
  "2026-02-18": [春节]
  "2026-04-04": [清明节, 假期]
  "2026-04-05": [清明节, 假期]
  "2026-04-06": [清明节, 假期]
  "2026-05-01": [劳动节, 五一]
  "2026-05-02": [劳动节, 五一]
  "2026-05-03": [劳动节, 五一]
  "2026-05-04": [劳动节, 五一]
  "2026-05-05": [劳动节, 五一]
  "2026-06-19": [端午节]
  "2026-09-25": [中秋节]
  "2026-10-01": [国庆节, 假期]
  "2026-10-02": [国庆节, 假期]

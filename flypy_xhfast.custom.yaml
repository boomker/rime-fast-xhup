# 飞鹤快拼方案的配置补丁
# 覆盖 flypy_xhfast.schema.yaml 和 全局配置中的部分参数。
# 在此方案下，这里的配置具有最高优先级。

##  一些常用的设置项, 找到需要进行的设置所在的行,
##  取消注释 (删除行开头的单个 # 符号) 即可启用该设置项.
##  注意不要删除前面的空格, YAML 文件的缩进比较严格, 缩进不对容易报错.
---

patch:
  # 候选菜单
  menu/+:
    # 注释掉下行以恢复常规候选标签序号
    alternative_select_labels: [ ①, ②, ③, ④, ⑤, ⑥, ⑦, ⑧, ⑨, ⓪ ]
    # alternative_select_keys: 1234567  # 候选项选中快捷键
    page_size: 7                        # 自定义候选项个数

  # 候选菜单布局样式
  style/+:
    font_point: 17                    # 候选字大小
    line_spacing: 5                   # 行间距大小
    show_paging: false                # 是否显示分页符号
    inline_preedit: false             # 编码位是否嵌入候选框
    text_orientation: horizontal      # 候选文字横向(horizontal)/纵向(vertical)
    candidate_list_layout: linear     # 候选菜单横向(linear)/纵向(stacked)

  switches/+:
    - name: emoji
      states: [🈚️, 😄]
      reset: 1
    - name: prediction  # 仅用于移动端
      states: [休想, 联想]
      reset: 0
    - name: char_mode
      states: [词组优先, 单字优先]
    - name: charset
      states: [通用字集, 增廣字集]
      reset: 1
    - name: charset_hint
      states: [码区隐藏, 码区显示]
    - name: preedit_format
      states: [双拼显示, 全拼显示]
      reset: 0  # 切换后重置为默认状态
    - options: [mask_hint, tone_hint, comment_off]
      states:
        - 注解类型 ➜ 辅码
        - 注解类型 ➜ 声调
        - 注解类型 ➜ 空白
      reset: 1

  engine/+:
    processors/+:
    segmentors/+:
    translators/+:
    filters/+:
  'engine/processors/@before 0': predictor
  'engine/translators/@before 0': predict_translator
  'engine/processors/@after 0': lua_processor@*keybinder
  # 注释下行, 以取消中英混合候选词自动添加的空格
  'engine/filters/@before last': lua_filter@*word_append_space*filter
  # 注释下行, 以取消中英混合输出上屏时自动添加的前导空格
  # 'engine/processors/@after 1': lua_processor@*word_append_space*processor

  key_binder/+:
    import_preset: default                    # 从 default.yaml 继承通用的
    fuzz_algebra_first: "8"                   # `8/Control+q` 简拼优先
    char_mode: "Control+s"                    # 单字/词组优先模式切换
    pin_cand: "Control+t"                     # 候选词置顶
    unpin_cand: "Control+t"                   # 候选词取消置顶
    drop_cand: "Control+d"                    # 强制删词, 无视输入的编码
    hide_cand: "Control+x"                    # 匹配当前输入码后隐藏指定的候选字词
    reduce_fq_cand: "Control+j"               # 匹配当前输入码后降频指定的候选字词
    switch_comment: "Control+n"               # 切换注释(小鹤形码 / 带调拼音 / 无)
    remove_user_word: "Control+r"             # 历史上屏字词调频为负(用户词典)
    easydict_translate: "Control+y"           # 调用 Easydict 翻译高亮字词
    switch_cn_en_schema: "Control+g"          # 切换中英方案(支持一键互切)
    symbol_menu_fallback: "Control+p"         # 符号二级菜单返回主菜单键
    select_first_character: "9"               # `9/minus` 以词定字(首字)
    select_last_character: "0"                # `0/equal` 以词定字(尾字)
    bindings/+:
      - {when: has_menu,  accept: ";", send: Control+2}         # 分号; 用于第2候选
      - {when: has_menu,  accept: ".", send: Control+3}         # 句号. 用于第3候选
      - {when: paging,    accept: comma, send: Page_Up}         # 逗号, 返回上一页
      - {when: has_menu,  accept: ']', send: Page_Down}         # 括号] 下一页
      # - {when: has_menu,  accept: "'", send: Control+3}       # 引号' 用于第3候选
      # - {when: paging,    accept: minus,  send: Page_Up}      # 减号- 返回上一页
      # - {when: paging,    accept: equal,  send: Page_Down}    # 等号= 下一页
      # - {when: has_menu,  accept: period, send: Page_Down}    # 句号. 下一页
      - {when: always,    accept: Control+Shift+0, select: .next}
      - {when: always,    accept: Control+Shift+E, select: easy_en}
      - {when: composing, accept: Shift+Tab,    send: Shift+Left}
      - {when: composing, accept: Control+i,    send: Shift+Left}
      - {when: composing, accept: Tab,          send: Shift+Right}
      - {when: composing, accept: Control+o,    send: Shift+Right}
      - {when: composing, accept: Control+w,    send: Control+BackSpace}

      # 以下按键绑定规则(含`tag` / `match`)需 keybinder(lua) 支持
      - {match: "^/$",    accept: "/", send: '{Down}'}
      - {match: "^=$",    accept: "=", send: '{Down}'}
      - {match: "^[a-z/]+'$", accept: ",", send: '{Shift+Left}'}
      - {match: "^[a-z/]+'$", accept: ".", send: '{Shift+Right}'}
      - {tag: calculator, accept: "'",     send: '{Page_Down}'}
      - {tag: calculator, accept: "Control+d", send: '{Delete}'}
      - {tag: calculator, accept: "(", send_sequence: '(){Left}'}
      - {match: "^.*\\)$", accept: ")", send_sequence: '{Right}'}
      - {tag: calculator, accept: "%", send_sequence: '/100'}
      - {tag: calculator, accept: "Shift+U", send_sequence: '10'}
      - {tag: calculator, accept: "Shift+B", send_sequence: '00'}
      - {tag: calculator, accept: "Shift+H", send_sequence: '100'}
      - {tag: calculator, accept: "Shift+Q", send_sequence: '000'}
      - {tag: calculator, accept: "Shift+K", send_sequence: '1000'}
      - {tag: calculator, accept: "Shift+W", send_sequence: '0000'}
      - {tag: chinese_number, accept: "o", send_sequence: '0'}
      - {tag: chinese_number, accept: "i", send_sequence: '1'}
      - {tag: chinese_number, accept: "b", send_sequence: '00'}
      - {tag: chinese_number, accept: "h", send_sequence: '100'}
      - {tag: chinese_number, accept: "q", send_sequence: '000'}
      - {tag: chinese_number, accept: "k", send_sequence: '1000'}
      - {tag: chinese_number, accept: "w", send_sequence: '0000'}
      - {tag: chinese_number, accept: "period", send_sequence: '.'}
      - {tag: chinese_number, accept: "s",   send_sequence: '{End}{Control+1}'}
      - {tag: chinese_number, accept: "d",   send_sequence: '{End}{Control+2}'}
      - {tag: chinese_number, accept: "f",   send_sequence: '{End}{Control+3}'}
      - {tag: chinese_number, accept: "j",   send_sequence: '{End}{Control+4}'}
      - {tag: chinese_number, accept: "u",   send_sequence: '{End}{Control+5}'}
      - {tag: chinese_number, accept: "m",   send_sequence: '{End}{Control+6}'}
      - {tag: date_time,      accept: "s",   send_sequence: '{End}{Control+3}'}
      - {tag: date_time,      accept: "d",   send_sequence: '{End}{Control+4}'}
      - {tag: date_time,      accept: "f",   send_sequence: '{End}{Control+5}'}
      - {tag: calculator, accept: "Shift+J", send_sequence: '{End}{Control+3}'}
      - {tag: calculator, accept: "Shift+I", send_sequence: '{End}{Control+4}'}
      - {tag: calculator, accept: "Shift+O", send_sequence: '{End}{Control+5}'}
      - {tag: calculator, accept: "Shift+L", send_sequence: '{End}{Control+6}'}

  recognizer/+:
    patterns/+:
      LaTeX: "^(/lt|lT)(.*)$"                     # LaTeX
      history: "^(/hs|hH|uH)$"                    # 上屏历史
      flypy_help: "^(/oh|oH)$"                    # 帮助菜单
      shortcut_cmd: "^/kj[a-z]*$"                 # 快捷指令(执行命令)
      shortcut_app: "^/jk[a-z]*$"                 # 快捷指令(启动应用)
      flypy_key_map: "^/ok[a-z]*$"                # 小鹤双拼键位帮助
      flypy_switcher: "^(/so|sO)$"                # 切换方案配置选项
      calculator: "^(=|cC)([^,;']*)$"             # 计算器(可查帮助)
      flypy_radical: "^(`L|rL|oL)[a-z]+$"         # 单字部件组字(查拼音)
      chinese_lunar:  "^(/nl|nL|cL)[0-9]*$"       # 中国农历(可反查)
      chinese_number: "^(/nn|nN|oN)[0-9.-]+$"     # 中文大写数字(金额)
      date_time: '^(/wd|date|orq)[-\+][0-9]+$'    # 日期(可查前后指定N日)

  date_time_seg:
    patterns:
      week: "^(/wk|week|oxq)$"                    # 星期
      time: "^(/wt|time|osj)'?$"                  # 时间
      date: '^(/wd|date|orq)[-\+]?$'              # 日期
      timestamp: "^(/wts|/uts|timestamp|ots)$"    # 时间戳
      week_before_after: "^/(wuz|wlk|wxz|wnk)$"   # 上周下周
      date_before_after: "^/(wqt|wzt|wmt|wht)$"   # [前昨明后]天
      month_before_after: "^/(wuy|wlm|wxy|wnm)$"  # 上个月下个月

  punctuator/+:
    digit_separators: ".:"                      # 指定要转换为英文半角的符号, 若双击则恢复全角(中文)
    # digit_separator_action: commit            # 上一行指定的符号在按下数字后的动作行为
    symbol_menu_prefix: '/vs'
    symbol_normal_prefix: '/'
    symbols/+:
    full_shape/+:
    half_shape/+:
      # '"': {pair: ['‘', '’']}
      # "'": {pair: ['“', '”']}
      # ";": {commit: "；"}           # 取消注释后, 恢复默认分号
      ";": [";", "；"]                # 添加注释, 以恢复默认分号
      "_": "_"
      '\': ['､', '、', '\', '＼']
      "@":
        - "@"
        # - "@xxx.com"
        - "@gmail.com"
        - "@foxmail.com"
        - "@outlook.com"
        - "@hotmail.com"
        - "@qq.com"
        - "@163.com"
        - "@139.com"

  speller/+:
    algebra/+:
      # - derive|/||                  # 取消注释,直接辅码(新手不推荐)

      ## 模糊音:
      - derive/^([qx])v/$1u/
      - derive/^([jy])u/$1v/
      # - derive/^l(.*)/n$1/          # l => n
      # - derive/^n(.*)/l$1/          # n => l
      # - derive/^v(.*)/z$1/          # zh => z
      # - derive/^i(.*)/c$1/          # ch => c
      # - derive/^u(.*)/s$1/          # sh => s
      # - derive/^(.*)k/$1b/          # ing => in
      # - derive/^(.*)g/$1f/          # [zcs][h]eng => [zcs][h]en
      # - derive/^(.*)f/$1g/          # [zcs][h]en => [zcs][h]eng

  easy_en/+:                          # 英文单词输入方案
    tips: "英文"
    wildcard: '*'
    # tag: easy_en
    word_search_limit: 300            # 模糊匹配最多迭代数

  custom_phrase/+:                    # 自定义短语
    comment_mark: " 📌"               # 注解标记

  flypy_key_map/+:                    # 小鹤双拼键位帮助
    prefix: "/ok"
    tips: "双拼查键"

  radical_lookup/+:                   # 部件组字反查拼音/拆分
    overwrite_comment: false
    dictionary: flypy_reverse         # 可自行更换反查词典

  pin_word:                           # 词条置顶配置
    word_quality: 1000
    comment_mark: " ᵀᴼᴾ"              # 🔝 置顶词标记

  pair_punct:                         # 符号配对开关
    enable: true

  emoji_reduce:                       # Emoji 降频
    index: 6                          # 到 index 位置

  cold_word_reduce:                   # 高亮词条降频
    index: 4                          # 到 index 位置
    excluded_types: ["easy_en"]

  LaTeX:                              # LaTeX 公式输入
    tag: LaTeX
    # prefix: "lT"
    prefix: "/lt"
    tips: "LaTeX 公式"

  history:                            # 上屏历史记录
    tag: history
    # prefix: "/hs"
    prefix: "hH"
    tips: "上屏历史"
    max_count: 99
    initial_quality: 999
    comment_max_length: 9
    excluded_types: ["punct"]

  calculator:                         # 简易计算器
    tag: calculator
    # prefix: "="
    prefix: "cC"
    suffix: "'"
    tips: "计算器"

  cand_selector:                      # 候选选择器
    word_lookup_limit: 300            # 检索最多迭代数
    auto_select_char: true            # 单字优先时全码唯一则自动顶屏(小鹤音形效果)
    auto_select_phrase: false         # 词组加间接辅码唯一则自动上屏(默认关闭)
    if_unmatched_show_mark: "⭕️"      # 当未匹配到候选项时, 首选 yield 一个标记以提示(留空则不显示)
    tone_convert_format:              # 声调过滤(依次对应: 一[轻]二三四声), 修改则不适配同文键盘
      - xlit/IUNM/1234/

  flypy_fuzzy:                        # 简拼翻译器
    enable_fuzz_func: true            # 是否开启简拼功能(支持中英数混合)
    fuzz_start_length: 2              # 简拼开始长度
    fuzz_max_length: 7                # 简拼最大长度
    word_lookup_limit: 300            # 检索最多迭代数

  chinese_number:                     # 中文大写数字(金额)
    tag: chinese_number
    # prefix: "/nn"
    prefix: "nN"
    suffix: "'"
    tips: "中文数字"
    select_keys: "sdfjum"

  chinese_lunar:                      # 中国农历(可反查)
    tag: chinese_lunar
    # prefix: "/nl"
    prefix: "nL"
    suffix: "'"
    tips: "农历"

  date_time:
    date_format:
      # 年份格式: year_cn: 二〇二六年; year: 2026
      # 月份格式: month_cn: 二月; month: 02; month_en: February; month_en_st: Feb.
      # 星期格式: week_cn: 星期日; week_cn_st: 周日; week_en: Sunday; week_en_st: Sun.
      # 当日格式: day_cn: 二十二日; day: 22; day_en_st: 22th
      - "{year}年{month}月{day}日"                        # 2026年02月22日
      - "{year}/{month}/{day}"                            # 2026/02/22
      - "{year}.{month}.{day}"                            # 2026.02.22
      - "{year_cn}年{month_cn}月{day_cn}日"               # 二〇二六年二月二十二日
      - "{month_en_st} {day_en_st}, {year}"               # Feb 05th, 2026
      - "{day_en_st} {month_en}, {year}"                  # 22th February, 2026
      - "{month_en} {day_en_st}, {year}"                  # February 22th, 2026
      - "{year}.{month}.{day} {hour}:{min}:{sec}"         # 2026.02.22 14:30:45
      - "{year}年{month}月{day}日 {hour}点{min}分{sec}秒" # 2026年02月22日 18点37分06秒
    time_format:
      # 时间格式: hour: 18; min: 30; sec: 45; TS: AM/PM
      - "{hour}:{min}"            # 18:30
      - "{hour}:{min} {TS}"       # 6:30 PM
      - "{hour}:{min}:{sec} {TS}" # 6:30:45 PM
      - "{hour}:{min}:{sec}"      # 18:30:45
      - "{hour}点{min}分"         # 18点37分
      - "{hour}点{min}分{sec}秒"  # 18点37分06秒
      - "{hour}时{min}分{sec}秒"  # 18时37分06秒
    # 时间前缀: 凌晨, 早上, 上午, 中午, 下午, 夜晚, 午夜
    enable_time_prefix: true      # 是否开启时间前缀(默认开启, 可在触发词末尾添加单引号'临时关闭)

  predictor:                          # 候选字词联想预测
    db: predict.db                    # librime-predict 数据库
    max_candidates: 7                 # 联想的候选项个数
    max_iterations: 1                 # 联想预测的次数
    # db: predict.userdb                # librime-predict-leveldb 数据库
